<!DOCTYPE html>
<html>
<head>
  <title>Election Poster</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f5e6d3;
      text-align: center;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    img {
      width: 100%;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    h1 {
      color: #ff6600;
      margin-top: 15px;
    }

    p {
      font-size: 18px;
      color: #333;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>જનસમર્થન</h1>

  <img src="poster.jpg" alt="Election Poster">

  <p>ભાજપ ઉમેદવાર</p>
  <p>શ્રી પરસોતમભાઈ બોદર</p>

</div>

</body>
</html>
