<!DOCTYPE html>
<html>
<head>
  <title>Make Your Poster</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5e6d3;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    canvas {
      border-radius: 10px;
      max-width: 100%;
    }

    .controls {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: orange;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>MAKE YOUR POSTER</h2>

<div class="container">

  <canvas id="canvas"></canvas>

  <div class="controls">
    <p>Upload Photo</p>
    <input type="file" accept="image/*" onchange="loadImage(event)">

    <p>Your Name</p>
    <input type="text" id="nameInput" placeholder="તમારું નામ લખો">

    <br>
    <button onclick="downloadPoster()">Download</button>
  </div>

</div>

<script>

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let baseImage = new Image();
baseImage.src = "poster.jpg";

let userImage = null;

baseImage.onload = function(){
  canvas.width = baseImage.width;
  canvas.height = baseImage.height;
  drawPoster();
}

function loadImage(event){
  userImage = new Image();
  userImage.src = URL.createObjectURL(event.target.files[0]);
  userImage.onload = drawPoster;
}

function drawPoster(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // draw base poster
  ctx.drawImage(baseImage, 0, 0);

  let w = canvas.width;
  let h = canvas.height;

  // ===== PHOTO (centered in circle) =====
  if(userImage){
    let cx = w * 0.275;   // fine-tuned X
    let cy = h * 0.545;   // fine-tuned Y
    let r  = w * 0.135;   // radius

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();

    ctx.drawImage(userImage, cx - r, cy - r, r * 2, r * 2);

    ctx.restore();
  }

  // ===== NAME (inside orange box) =====
  let name = document.getElementById("nameInput").value;

  ctx.font = "bold " + (w * 0.038) + "px Arial";
  ctx.fillStyle = "white";
  ctx.textAlign = "center";

  let nameX = w * 0.50;
  let nameY = h * 0.80;   // corrected position

  ctx.fillText(name.toUpperCase(), nameX, nameY);
}

document.getElementById("nameInput").addEventListener("input", drawPoster);

function downloadPoster(){
  let link = document.createElement("a");
  link.download = "poster.png";
  link.href = canvas.toDataURL();
  link.click();
}

</script>

</body>
</html>
