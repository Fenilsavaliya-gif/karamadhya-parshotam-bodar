<!DOCTYPE html>
<html>
<head>
<title>Make Your Poster</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5e6d3;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

canvas {
  border-radius: 10px;
}

.controls {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: orange;
  border: none;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<h2>MAKE YOUR POSTER</h2>

<div class="container">

<canvas id="canvas" width="600" height="800"></canvas>

<div class="controls">
  <p>Upload Photo</p>
  <input type="file" accept="image/*" onchange="loadImage(event)">

  <p>Your Name</p>
  <input type="text" id="nameInput" placeholder="Enter your name">

  <br>
  <button onclick="downloadPoster()">Download</button>
</div>

</div>

<script>

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let baseImage = new Image();
baseImage.src = "poster.jpg";

let userImage = null;

baseImage.onload = function(){
  drawPoster();
}

function loadImage(event){
  userImage = new Image();
  userImage.src = URL.createObjectURL(event.target.files[0]);
  userImage.onload = drawPoster;
}

function drawPoster(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // draw base poster
  ctx.drawImage(baseImage, 0, 0, 600, 800);

  // draw user image in circle
  if(userImage){
    ctx.save();
    ctx.beginPath();
    ctx.arc(205, 395, 75, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(userImage, 130, 320, 150, 150);
    ctx.restore();
  }

  // draw name
  let name = document.getElementById("nameInput").value;
ctx.font = "bold 22px Arial";
ctx.fillStyle = "white";
ctx.textAlign = "center";
ctx.fillText(name, 300, 540);
}

document.getElementById("nameInput").addEventListener("input", drawPoster);

function downloadPoster(){
  let link = document.createElement("a");
  link.download = "poster.png";
  link.href = canvas.toDataURL();
  link.click();
}

</script>

</body>
</html>
