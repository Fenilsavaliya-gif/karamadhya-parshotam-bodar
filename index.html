<!DOCTYPE html>
<html>
<head>
<title>Make Your Poster</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5e6d3;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

canvas {
  max-width: 100%;
  border-radius: 10px;
}

.controls {
  background: white;
  padding: 15px;
  border-radius: 10px;
  width: 250px;
}

input[type="range"] {
  width: 100%;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: orange;
  border: none;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<h2>MAKE YOUR POSTER</h2>

<div class="container">

<canvas id="canvas"></canvas>

<div class="controls">

  <p><b>Upload Photo</b></p>
  <input type="file" accept="image/*" onchange="loadImage(event)">

  <p><b>Your Name</b></p>
  <input type="text" id="nameInput" placeholder="તમારું નામ લખો">

  <hr>

  <p>X (Left / Right)</p>
  <input type="range" id="x" min="0" max="1080" value="300">

  <p>Y (Up / Down)</p>
  <input type="range" id="y" min="0" max="1350" value="700">

  <p>Size</p>
  <input type="range" id="size" min="50" max="300" value="150">

  <button onclick="downloadPoster()">Download</button>

</div>

</div>

<script>

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let baseImage = new Image();
baseImage.src = "poster.jpg";

let userImage = null;

baseImage.onload = function(){
  canvas.width = baseImage.width;
  canvas.height = baseImage.height;
  drawPoster();
}

function loadImage(e){
  userImage = new Image();
  userImage.src = URL.createObjectURL(e.target.files[0]);
  userImage.onload = drawPoster;
}

function drawPoster(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(baseImage,0,0);

  let x = document.getElementById("x").value;
  let y = document.getElementById("y").value;
  let size = document.getElementById("size").value;

  if(userImage){
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI*2);
    ctx.clip();
    ctx.drawImage(userImage, x-size, y-size, size*2, size*2);
    ctx.restore();
  }

  let name = document.getElementById("nameInput").value;

  ctx.font = "bold 40px Arial";
  ctx.fillStyle = "white";
  ctx.textAlign = "center";

  ctx.fillText(name.toUpperCase(), 540, 1000);
}

// 🔥 THIS LINE IS IMPORTANT (auto update sliders)
document.querySelectorAll("input").forEach(el=>{
  el.addEventListener("input", drawPoster);
});

function downloadPoster(){
  let link = document.createElement("a");
  link.download = "poster.png";
  link.href = canvas.toDataURL();
  link.click();
}

</script>

</body>
</html>
